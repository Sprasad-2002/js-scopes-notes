<!DOCTYPE html>
<html lang="en">
<head>

    <title>Global Scope</title>
    <script>
        let str="I am a global variable";
        function Greet(){
            console.log(str);

        }
        Greet();
        console.log(str);
    </script>
</head>
<body>
    <h1>Global Scope</h1>
</body>
</html>
